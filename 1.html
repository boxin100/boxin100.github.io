<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="線上電子娛樂城，提供多種娛樂遊戲、體育博彩、推廣活動，支持安全支付">
    <title>線上電子娛樂城</title>
    <link rel="stylesheet" href="styles.css"> <!-- 引入CSS樣式 -->
</head>
<body>

    <!-- 頁首: 標誌與導航 -->
    <header>
        <div class="logo">
            <a href="/">線上電子娛樂城</a>
        </div>
        <nav>
            <ul>
                <li><a href="/">首頁</a></li>
                <li><a href="/games">遊戲</a></li>
                <li><a href="/promotions">優惠活動</a></li>
                <li><a href="/account">會員中心</a></li>
                <li><a href="/support">客戶支持</a></li>
                <li><a href="/login">登錄/註冊</a></li>
            </ul>
        </nav>
    </header>

    <!-- 首頁: 主內容區 -->
    <main>
        <section class="hero">
            <h1>歡迎來到線上電子娛樂城</h1>
            <p>體驗最刺激的遊戲，享受無與倫比的娛樂樂趣！</p>
            <a href="/games" class="btn">開始遊戲</a>
        </section>

        <!-- 熱門遊戲區 -->
        <section class="featured-games">
            <h2>熱門遊戲</h2>
            <div class="games-list">
                <div class="game-item">
                    <img src="slot-game.jpg" alt="老虎機">
                    <p>老虎機</p>
                </div>
                <div class="game-item">
                    <img src="roulette-game.jpg" alt="輪盤">
                    <p>輪盤</p>
                </div>
                <div class="game-item">
                    <img src="blackjack-game.jpg" alt="二十一點">
                    <p>二十一點</p>
                </div>
                <div class="game-item">
                    <img src="sports-betting.jpg" alt="體育博彩">
                    <p>體育博彩</p>
                </div>
            </div>
        </section>

        <!-- 推廣活動 -->
        <section class="promotions">
            <h2>最新優惠</h2>
            <ul>
                <li><a href="/promotions/welcome-bonus">新手註冊優惠</a></li>
                <li><a href="/promotions/deposit-bonus">存款回饋獎金</a></li>
                <li><a href="/promotions/weekly-challenges">每周挑戰賽</a></li>
            </ul>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer>
        <div class="footer-nav">
            <ul>
                <li><a href="/terms">使用條款</a></li>
                <li><a href="/privacy">隱私政策</a></li>
                <li><a href="/responsible-gambling">負責任博彩</a></li>
            </ul>
        </div>
        <div class="contact-info">
            <p>&copy; 2024 線上電子娛樂城 | <a href="/contact">聯繫我們</a></p>
        </div>
    </footer>

</body>
</html>
